# AI-HMS 前端 Nginx 配置
# SPA 路由回退 + 静态资源缓存 + API 反向代理

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # 字符集
    charset utf-8;

    # 静态资源缓存 - Vite 构建的 assets 带 hash，可长期缓存
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # favicon & manifest 短期缓存
    location ~* \.(ico|png|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API 反向代理 → 后端 8080
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # 不缓存 API 响应
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 健康检查端点直接返回 200（供 docker healthcheck / 负载均衡探针使用）
    location /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # SPA 路由回退 — 所有非文件路径返回 index.html
    location / {
        try_files $uri $uri/ /index.html;

        # index.html 不缓存，确保前端更新后立即生效
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        add_header Expires       "0";
    }

    # 隐藏 Nginx 版本号
    server_tokens off;

    # 安全响应头
    add_header X-Content-Type-Options  "nosniff"    always;
    add_header X-Frame-Options         "SAMEORIGIN" always;
    add_header X-XSS-Protection        "1; mode=block" always;

    # Gzip 压缩
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css text/javascript application/javascript
                    application/json application/xml image/svg+xml;

    # 日志
    access_log /var/log/nginx/ai-hms-access.log;
    error_log  /var/log/nginx/ai-hms-error.log warn;
}
