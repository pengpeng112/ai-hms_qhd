<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>透析排班 — 周视图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; }
    .sticky-l { position: sticky; left: 0; z-index: 10; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root" class="p-4"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback, useMemo } = React;
    const API = window.location.origin + "/api/v1";
    const WD = ["周一", "周二", "周三", "周四", "周五", "周六"];
    const STATUS = {0:"待排",10:"草稿",20:"已确认",50:"透析中",60:"完成",70:"取消",80:"缺席"};
    const ROLE_LABEL = {"":"超级用户", doctor:"医生", head_nurse:"护士长", charge_nurse:"主班护士", nurse:"护士"};

    function fmt(d){ const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,"0"), day=String(d.getDate()).padStart(2,"0"); return `${y}-${m}-${day}`; }
    function todayStr(){ return fmt(new Date()); }
    // 任意日期 → 其所在自然周的周一(YYYY-MM-DD)
    function mondayOf(s){
      const d = new Date(s + "T00:00:00");
      const wd = d.getDay();                 // 0=周日..6=周六
      d.setDate(d.getDate() + (wd === 0 ? -6 : 1 - wd));
      return fmt(d);
    }

    function modeStyle(mode) {
      if (mode === "HDF") return "bg-emerald-100 text-emerald-800 border-emerald-300";
      if (mode === "CRRT") return "bg-rose-100 text-rose-800 border-rose-300";
      return "bg-slate-100 text-slate-700 border-slate-300";
    }
    function zoneBadge(z) {
      return ({A:"bg-sky-600", B:"bg-violet-600", C:"bg-rose-600"})[z] || "bg-slate-500";
    }

    let ROLE = "head_nurse"; // 当前角色(X-Role),空=超级用户(仅 DEV_SUPERUSER 模式可用)
    async function post(path, body) {
      const headers = {"Content-Type":"application/json"};
      if (ROLE) headers["X-Role"] = ROLE;
      const r = await fetch(API + path, {
        method: "POST", headers,
        body: body ? JSON.stringify(body) : undefined
      });
      return r.json();
    }

    function App() {
      const [date, setDate] = useState(() => mondayOf(todayStr()));
      const [weeks, setWeeks] = useState(2);
      const [board, setBoard] = useState(null);
      const [msg, setMsg] = useState("");
      const [msgErr, setMsgErr] = useState(false);
      const [loading, setLoading] = useState(false);
      const [menu, setMenu] = useState(null);     // 选中已排格子的操作菜单
      const [moveSrc, setMoveSrc] = useState(null); // 移动中的排班 {id, patientId}
      const [confirmDate, setConfirmDate] = useState(() => mondayOf(todayStr()));
      const [tempModal, setTempModal] = useState(null);   // 临时透析录入
      const [outageModal, setOutageModal] = useState(null); // 停机登记 {machine}
      const [planModal, setPlanModal] = useState(null);   // 方案变更
      const [conflicts, setConflicts] = useState([]);     // 冲突/待处理队列
      const [showConflicts, setShowConflicts] = useState(false);
      const [diffs, setDiffs] = useState([]);             // 应排/已排差异
      const [showDiffs, setShowDiffs] = useState(false);
      const [quality, setQuality] = useState(null);       // 排班质量评分
      const [role, setRole] = useState("head_nurse");     // 角色(权限演示),默认护士长
      const [crrt, setCrrt] = useState([]);               // CRRT 占用
      const [crrtModal, setCrrtModal] = useState(null);   // CRRT 录入
      const [dragSrc, setDragSrc] = useState(null);       // 拖拽中的排班
      const [adminOpen, setAdminOpen] = useState(false);  // 管理面板
      const [adminTab, setAdminTab] = useState("ward");
      const [adm, setAdm] = useState({wards:[],machines:[],patients:[],profiles:[],templates:[],shifts:[]});
      const [fWard, setFWard] = useState({name:"",zoneType:"A",sort:1});
      const [fMachine, setFMachine] = useState({wardId:"",code:"",machineType:"HD",positionIndex:1});
      const [fPat, setFPat] = useState({patientId:"",name:"",gender:"男",zoneTag:"A",homeWardId:"",freqPattern:10,shiftId:"",hdfEnabled:false,hdfWeekday:1});

      const load = useCallback(async (d) => {
        setLoading(true);
        try {
          const r = await fetch(`${API}/schedule/board?date=${d}`);
          const b = await r.json();
          setBoard(b);
          if (b.dates && b.dates.length) setConfirmDate(b.dates[0]);
          const cr = await fetch(`${API}/conflicts?status=0`);
          const cj = await cr.json();
          setConflicts(cj.conflicts || []);
          const dr = await fetch(`${API}/schedule/diffs?date=${d}&weeks=2`);
          const dj = await dr.json();
          setDiffs(dj.items || []);
          const xr = await fetch(`${API}/schedule/crrt?date=${d}`);
          const xj = await xr.json();
          setCrrt(xj.items || []);
          const qr = await fetch(`${API}/schedule/quality?date=${d}&weeks=2`);
          setQuality(await qr.json());
        } catch (e) { setMsg("加载失败: " + e); }
        setLoading(false);
      }, []);

      useEffect(() => { load(date); }, [date]); // 日期变更(已吸附到周一)自动刷新

      // 统一提示:isErr=true 显示红色,否则绿色
      const notify = (text, isErr) => { setMsg(text); setMsgErr(!!isErr); };
      // 处理接口返回:成功显示 okText,失败(含 401/403)显示红色错误
      const handle = (j, okText, failPrefix) => {
        if (j && j.error) { notify((failPrefix||"操作") + "失败: " + j.error, true); return false; }
        notify(okText, false); return true;
      };

      const seed = async () => { const j = await post("/admin/seed"); handle(j, j.seeded || "已写入演示数据", "写演示数据"); await load(date); };

      const generate = async () => {
        setLoading(true);
        const j = await post("/schedule/generate", { startDate: date, weeks: Number(weeks) });
        handle(j, `生成:${j.dialysisDays} 透析日 / ${j.drafts} 草稿 / ${j.conflicts} 冲突 / ${j.parityAssigned} 人定奇偶周`, "生成排班");
        await load(date); setLoading(false);
      };

      const confirmPlan = async () => {
        const j = await post("/schedule/confirm-plan", { weekStart: board.weekStart, weeks: Number(weeks) });
        handle(j, `① 整盘确认:${j.confirmed} 条 → 已确认`, "整盘确认");
        await load(date);
      };
      const confirmDay = async (level) => {
        const j = await post("/schedule/confirm-day", { date: confirmDate, level });
        handle(j, `${level===2?"②次日":"③当日"}确认 ${confirmDate}:${j.confirmed} 条`, "确认");
        await load(date);
      };

      const doCancel = async () => { const j = await post(`/shifts/${menu.cell.id}/cancel`, {reason:"前端操作"}); setMenu(null); handle(j,"已取消","取消"); await load(date); };
      const doAbsent = async () => { const j = await post(`/shifts/${menu.cell.id}/absent`, {reason:"前端操作"}); setMenu(null); handle(j,"已标记缺席","缺席"); await load(date); };
      const startMove = () => { setMoveSrc({ id: menu.cell.id, patientId: menu.cell.patientId, name: menu.cell.patientName }); setMenu(null); notify("移动模式:点击一个空格作为目标(或点上方「取消移动」)", false); };

      const submitTemp = async () => {
        const f = tempModal;
        const j = await post("/schedule/temporary", { patientId: Number(f.patientId), wardId: Number(f.wardId), date: f.date, mode: f.mode });
        if (handle(j, `临时透析 #${f.patientId} 已插入`, "临时透析")) setTempModal(null);
        await load(date);
      };
      const submitOutage = async () => {
        const f = outageModal;
        const j = await post(`/machines/${f.machine.id}/outage`, { startDate: f.startDate, endDate: f.endDate, type: Number(f.type), reason: f.reason });
        if (handle(j, `${f.machine.code} 停机:受影响 ${j.affected} / 迁移 ${j.migrated} / 冲突 ${j.conflicts}`, "停机")) setOutageModal(null);
        await load(date);
      };

      const submitHoliday = async () => {
        const j = await post("/schedule/holiday", { date: confirmDate, mode: 10 });
        handle(j, `假日停诊 ${confirmDate}:取消 ${j.cancelled} / 建议 ${j.suggested} / 无位 ${j.noSlot}`, "假日");
        await load(date);
      };
      const submitPlan = async () => {
        const f = planModal;
        const j = await post(`/patients/${f.patientId}/plan-change`, { changeType: f.changeType, newValue: f.newValue, effectiveDate: f.effectiveDate });
        if (handle(j, `方案变更 #${f.patientId}:重排 ${j.replanned} / 锁定 ${j.locked}。${j.hint||""}`, "方案变更")) setPlanModal(null);
        await load(date);
      };

      const submitCrrt = async () => {
        const f = crrtModal;
        const j = await post("/schedule/crrt", { patientId:Number(f.patientId), wardId:Number(f.wardId), startAt:f.startAt, endAt:f.endAt });
        if (handle(j, `CRRT #${f.patientId} 已安排`, "CRRT")) setCrrtModal(null);
        await load(date);
      };
      const doMakeup = async (pid) => {
        const j = await post(`/patients/${pid}/makeup`, { weekStart: board.weekStart, weeks: 2 });
        handle(j, `#${pid} 补排 ${j.placed} 次 / 冲突 ${j.conflicts}`, "补排");
        await load(date);
      };
      const onDrop = async (machineId, d, shiftId, cell) => {
        if (!dragSrc) return;
        if (cell) { notify("目标必须是空格", true); setDragSrc(null); return; }
        const j = await post(`/shifts/${dragSrc.id}/move`, { machineId, date: d, shiftId });
        handle(j, `${dragSrc.name||('#'+dragSrc.patientId)} 已拖动到新机位`, "移动");
        setDragSrc(null); await load(date);
      };

      const loadAdmin = async () => {
        const get = async p => (await fetch(API+p)).json();
        const [w,m,pt,pr,t,sh] = await Promise.all([
          get("/admin/wards"),get("/admin/machines"),get("/admin/patients"),
          get("/admin/profiles"),get("/admin/templates"),get("/admin/shifts")]);
        setAdm({wards:w.items||[],machines:m.items||[],patients:pt.items||[],profiles:pr.items||[],templates:t.items||[],shifts:sh.items||[]});
      };
      const openAdmin = async () => { setAdminOpen(true); await loadAdmin(); };
      const createWard = async () => {
        const j = await post("/admin/wards", {...fWard, sort:Number(fWard.sort)});
        setMsg(j.error?"建病区失败: "+j.error:`病区「${fWard.name}」已建`); await loadAdmin();
      };
      const createMachine = async () => {
        const j = await post("/admin/machines", {wardId:Number(fMachine.wardId),code:fMachine.code,machineType:fMachine.machineType,positionIndex:Number(fMachine.positionIndex)});
        setMsg(j.error?"建机器失败: "+j.error:`机器「${fMachine.code}」已建`); await loadAdmin();
      };
      const savePatient = async () => {
        const jp = await post("/admin/patients", {id:Number(fPat.patientId),name:fPat.name,gender:fPat.gender});
        if(jp.error){ setMsg("建病人失败: "+jp.error); return; }
        const body = {patientId:Number(fPat.patientId),zoneTag:fPat.zoneTag,homeWardId:Number(fPat.homeWardId),freqPattern:Number(fPat.freqPattern),shiftId:Number(fPat.shiftId),defaultMode:"HD",hdfEnabled:fPat.hdfEnabled,hdfWeekday:Number(fPat.hdfWeekday)};
        const jpr = await post("/admin/profiles", body);
        setMsg(jpr.error?"建骨架失败: "+jpr.error:`病人 #${fPat.patientId} ${fPat.name} 录入成功`); await loadAdmin();
      };
      const rebuildTpl = async () => {
        const j = await post("/admin/templates/rebuild", {name:""});
        setMsg(j.error?"模板重建失败: "+j.error:`模板已重建:${j.items} 项(请回主视图「生成排班」)`); await loadAdmin();
      };
      const FREQS = [[10,"一三五"],[20,"二四六"],[30,"每周两次(二四)"],[40,"每周一次(周四)"],[90,"临时"]];
      const wardName = id => (adm.wards.find(w=>w.id===id)||{}).name || id;

      const onCellClick = async (machineId, d, shiftId, cell) => {
        if (moveSrc) {
          if (cell) { notify("目标必须是空格", true); return; }
          const j = await post(`/shifts/${moveSrc.id}/move`, { machineId, date: d, shiftId });
          handle(j, `${moveSrc.name||('#'+moveSrc.patientId)} 已移动`, "移动");
          setMoveSrc(null); await load(date);
        } else if (cell) {
          setMenu({ cell, machineId, date: d, shiftId });
        }
      };

      const shifts = board?.shifts || [];
      const dates = board?.dates || [];
      const colCount = dates.length * shifts.length;
      const today = todayStr();

      // 顶部统计概览
      const stats = useMemo(() => {
        const pats = new Set(); let total = 0, pending = 0;
        (board?.wards||[]).forEach(w => (w.machines||[]).forEach(m => {
          if (m.cells) Object.values(m.cells).forEach(c => { total++; pats.add(c.patientId); if (!c.confirms) pending++; });
        }));
        return { patients: pats.size, total, pending };
      }, [board]);

      return (
        <div className="max-w-full">
          {/* 标题栏 + 角色(右上) */}
          <div className="flex items-center justify-between mb-3">
            <h1 className="text-xl font-bold">🩺 透析排班 · 周视图</h1>
            <div className="flex items-center gap-2 text-sm">
              <span className="text-slate-500">角色</span>
              <select value={role} onChange={e=>{ROLE=e.target.value; setRole(e.target.value);}}
                className="border rounded px-2 py-1 bg-white" title="演示权限控制">
                <option value="">超级用户</option>
                <option value="doctor">医生</option>
                <option value="head_nurse">护士长</option>
                <option value="charge_nurse">主班护士</option>
                <option value="nurse">护士</option>
              </select>
              <span className="text-xs text-slate-400">当前:{ROLE_LABEL[role]}</span>
            </div>
          </div>

          {/* 统计概览 */}
          <div className="flex flex-wrap items-stretch gap-2 mb-3">
            {[
              {k:"病人数", v:stats.patients, c:"bg-sky-50 border-sky-200 text-sky-800"},
              {k:"已排班次", v:stats.total, c:"bg-slate-50 border-slate-200 text-slate-700"},
              {k:"待确认", v:stats.pending, c:"bg-amber-50 border-amber-200 text-amber-800"},
              {k:"冲突", v:conflicts.length, c:"bg-rose-50 border-rose-200 text-rose-800"},
              {k:"差异", v:diffs.length, c:"bg-orange-50 border-orange-200 text-orange-800"},
            ].map(s=>(
              <div key={s.k} className={"border rounded px-3 py-1.5 min-w-[88px] "+s.c}>
                <div className="text-lg font-bold leading-none">{s.v}</div>
                <div className="text-[11px] mt-0.5">{s.k}</div>
              </div>
            ))}
            {quality && (
              <div className="border rounded px-3 py-1.5 bg-emerald-50 border-emerald-200 text-emerald-800"
                   title={`达标率 ${Math.round(quality.onTargetRate*100)}% · 机器利用率 ${Math.round(quality.utilization*100)}% · 位置稳定率 ${Math.round(quality.stabilityRate*100)}%`}>
                <div className="text-lg font-bold leading-none">{quality.score}<span className="text-xs font-normal">分</span></div>
                <div className="text-[11px] mt-0.5">质量评分</div>
              </div>
            )}
            {board && (
              <div className="border rounded px-3 py-1.5 bg-white flex flex-col justify-center">
                <div className="text-[11px] text-slate-400">本周范围</div>
                <div className="text-sm font-medium">{board.weekStart} ~ {board.weekEnd}</div>
              </div>
            )}
          </div>

          {/* 工具栏:查看与数据 */}
          <div className="flex flex-wrap items-center gap-2 mb-2 text-sm bg-white border rounded px-2 py-1.5">
            <span className="text-slate-400 text-xs">查看</span>
            <label>起始周一
              <input type="date" value={date} onChange={e=>e.target.value && setDate(mondayOf(e.target.value))}
                className="ml-1 border rounded px-2 py-1" title="任意日期会自动吸附到所在周的周一" />
            </label>
            <select value={weeks} onChange={e=>setWeeks(e.target.value)} className="border rounded px-2 py-1">
              <option value={2}>2 周</option><option value={4}>4 周</option>
            </select>
            <button onClick={()=>load(date)} className="bg-slate-200 hover:bg-slate-300 rounded px-3 py-1">刷新</button>
            <span className="mx-1 text-slate-200">|</span>
            <span className="text-slate-400 text-xs">数据</span>
            <button onClick={generate} className="bg-sky-600 hover:bg-sky-700 text-white rounded px-3 py-1">生成排班</button>
            <button onClick={seed} className="bg-slate-100 hover:bg-slate-200 border rounded px-3 py-1">写演示数据</button>
            <button onClick={openAdmin} className="bg-indigo-600 hover:bg-indigo-700 text-white rounded px-3 py-1">⚙ 管理</button>
          </div>

          {/* 工具栏:确认与扰动 */}
          <div className="flex flex-wrap items-center gap-2 mb-2 text-sm bg-white border rounded px-2 py-1.5">
            <span className="text-slate-400 text-xs">确认</span>
            <button onClick={confirmPlan} className="bg-emerald-600 hover:bg-emerald-700 text-white rounded px-2 py-1">① 整盘确认</button>
            <select value={confirmDate} onChange={e=>setConfirmDate(e.target.value)} className="border rounded px-2 py-1">
              {dates.map((d,i)=><option key={d} value={d}>{WD[i]} {d.slice(5)}</option>)}
            </select>
            <button onClick={()=>confirmDay(2)} className="bg-amber-500 hover:bg-amber-600 text-white rounded px-2 py-1">② 次日确认</button>
            <button onClick={()=>confirmDay(3)} className="bg-orange-600 hover:bg-orange-700 text-white rounded px-2 py-1">③ 当日确认</button>
            <span className="mx-1 text-slate-200">|</span>
            <span className="text-slate-400 text-xs">扰动</span>
            <button onClick={submitHoliday} className="bg-violet-600 hover:bg-violet-700 text-white rounded px-2 py-1">设为假日</button>
            <button onClick={()=>setPlanModal({patientId:"",changeType:"FREQ",newValue:"",effectiveDate:(dates[0]||date)})} className="bg-teal-600 hover:bg-teal-700 text-white rounded px-2 py-1">方案变更…</button>
            <button onClick={()=>setTempModal({patientId:"", wardId:(board?.wards?.[0]?.id)||1, date:(dates[0]||date), mode:"HD"})}
              className="bg-rose-600 hover:bg-rose-700 text-white rounded px-2 py-1">＋临时透析</button>
            <button onClick={()=>{const cw=(board?.wards||[]).find(w=>w.zoneType==='C'); setCrrtModal({patientId:"", wardId:(cw?.id)||"", startAt:(dates[0]||date)+" 09:00", endAt:""});}}
              className="bg-fuchsia-700 hover:bg-fuchsia-800 text-white rounded px-2 py-1">＋CRRT</button>
          </div>

          {/* 图例 + 面板入口 + 消息 */}
          <div className="flex flex-wrap gap-3 mb-2 text-xs items-center">
            <span className="px-2 py-0.5 rounded border bg-slate-100 border-slate-300">HD</span>
            <span className="px-2 py-0.5 rounded border bg-emerald-100 border-emerald-300">HDF</span>
            <span className="px-2 py-0.5 rounded border bg-rose-100 border-rose-300">CRRT</span>
            <span className="px-1.5 py-0.5 rounded bg-amber-100 text-amber-800">今天</span>
            <span className="text-slate-400">✓=确认级别</span>
            <button onClick={()=>setShowConflicts(v=>!v)}
              className={"rounded px-2 py-0.5 border " + (conflicts.length ? "bg-amber-100 border-amber-400 text-amber-800 font-semibold" : "bg-slate-100 border-slate-300 text-slate-500")}>
              ⚠ 冲突队列 {conflicts.length}
            </button>
            <button onClick={()=>setShowDiffs(v=>!v)}
              className={"rounded px-2 py-0.5 border " + (diffs.length ? "bg-rose-100 border-rose-400 text-rose-800 font-semibold" : "bg-slate-100 border-slate-300 text-slate-500")}>
              📊 差异 {diffs.length}
            </button>
            {loading && <span className="text-slate-400">加载中…</span>}
            {msg && <span className={"font-medium px-2 py-0.5 rounded " + (msgErr ? "bg-rose-50 text-rose-700 border border-rose-200" : "bg-emerald-50 text-emerald-700 border border-emerald-200")}>{msg}</span>}
            {moveSrc && <button onClick={()=>{setMoveSrc(null);notify("已取消移动",false);}} className="bg-rose-100 text-rose-700 border border-rose-300 rounded px-2 py-0.5">取消移动 {moveSrc.name||('#'+moveSrc.patientId)}</button>}
          </div>

          {showConflicts && (
            <div className="mb-2 border rounded bg-amber-50/50 p-2 text-xs max-h-48 overflow-auto">
              <div className="font-semibold mb-1">⚠ 待处理冲突 / 建议({conflicts.length})</div>
              {conflicts.length===0 && <div className="text-slate-400">暂无</div>}
              {conflicts.map(c=>(
                <div key={c.id} className="flex gap-2 py-0.5 border-b border-amber-100">
                  <span className={"px-1 rounded text-white text-[10px] " + (c.severity===20?"bg-rose-600":"bg-amber-500")}>{c.severity===20?"报警":"建议"}</span>
                  <span className="font-mono text-slate-500">{c.conflictType}</span>
                  {c.patientId>0 && <span>#{c.patientId}</span>}
                  {c.scheduleDate && <span className="text-slate-400">{String(c.scheduleDate).slice(0,10)}</span>}
                  <span className="text-slate-600">{c.detail}</span>
                </div>
              ))}
            </div>
          )}

          {showDiffs && (
            <div className="mb-2 border rounded bg-rose-50/50 p-2 text-xs max-h-48 overflow-auto">

                    <option value={20}>长期/报废(报警人工迁移)</option>
                  </select></label>
                  <label>原因 <input value={outageModal.reason} onChange={e=>setOutageModal({...outageModal,reason:e.target.value})} className="w-full border rounded px-2 py-1" placeholder="如 故障维修" /></label>
                </div>
                <div className="flex gap-2 mt-3">
                  <button onClick={submitOutage} className="flex-1 bg-slate-700 hover:bg-slate-800 text-white rounded px-3 py-1.5 text-sm">登记并迁移</button>
                  <button onClick={()=>setOutageModal(null)} className="flex-1 bg-slate-100 border rounded px-3 py-1.5 text-sm">取消</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
