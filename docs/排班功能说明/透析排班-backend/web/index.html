<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>透析排班 — 周视图</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { font-family: -apple-system, "Microsoft YaHei", sans-serif; }
    .sticky-l { position: sticky; left: 0; z-index: 10; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800">
  <div id="root" class="p-4"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;
    const API = window.location.origin + "/api/v1";
    const WD = ["周一", "周二", "周三", "周四", "周五", "周六"];
    const STATUS = {0:"待排",10:"草稿",20:"已确认",50:"透析中",60:"完成",70:"取消",80:"缺席"};

    function modeStyle(mode) {
      if (mode === "HDF") return "bg-emerald-100 text-emerald-800 border-emerald-300";
      if (mode === "CRRT") return "bg-rose-100 text-rose-800 border-rose-300";
      return "bg-slate-100 text-slate-700 border-slate-300";
    }
    function zoneBadge(z) {
      return ({A:"bg-sky-600", B:"bg-violet-600", C:"bg-rose-600"})[z] || "bg-slate-500";
    }

    let ROLE = ""; // 当前角色(X-Role),空=超级用户
    async function post(path, body) {
      const headers = {"Content-Type":"application/json"};
      if (ROLE) headers["X-Role"] = ROLE;
      const r = await fetch(API + path, {
        method: "POST", headers,
        body: body ? JSON.stringify(body) : undefined
      });
      return r.json();
    }

    function App() {
      const [date, setDate] = useState("2025-01-06");
      const [weeks, setWeeks] = useState(2);
      const [board, setBoard] = useState(null);
      const [msg, setMsg] = useState("");
      const [loading, setLoading] = useState(false);
      const [menu, setMenu] = useState(null);     // 选中已排格子的操作菜单
      const [moveSrc, setMoveSrc] = useState(null); // 移动中的排班 {id, patientId}
      const [confirmDate, setConfirmDate] = useState("2025-01-06");
      const [tempModal, setTempModal] = useState(null);   // 临时透析录入
      const [outageModal, setOutageModal] = useState(null); // 停机登记 {machine}
      const [planModal, setPlanModal] = useState(null);   // 方案变更
      const [conflicts, setConflicts] = useState([]);     // 冲突/待处理队列
      const [showConflicts, setShowConflicts] = useState(false);
      const [diffs, setDiffs] = useState([]);             // 应排/已排差异
      const [showDiffs, setShowDiffs] = useState(false);
      const [role, setRole] = useState("");               // 角色(权限演示)
      const [crrt, setCrrt] = useState([]);               // CRRT 占用
      const [crrtModal, setCrrtModal] = useState(null);   // CRRT 录入
      const [dragSrc, setDragSrc] = useState(null);       // 拖拽中的排班

      const load = useCallback(async (d) => {
        setLoading(true);
        try {
          const r = await fetch(`${API}/schedule/board?date=${d}`);
          const b = await r.json();
          setBoard(b);
          if (b.dates && b.dates.length) setConfirmDate(b.dates[0]);
          const cr = await fetch(`${API}/conflicts?status=0`);
          const cj = await cr.json();
          setConflicts(cj.conflicts || []);
          const dr = await fetch(`${API}/schedule/diffs?date=${d}&weeks=2`);
          const dj = await dr.json();
          setDiffs(dj.items || []);
          const xr = await fetch(`${API}/schedule/crrt?date=${d}`);
          const xj = await xr.json();
          setCrrt(xj.items || []);
        } catch (e) { setMsg("加载失败: " + e); }
        setLoading(false);
      }, []);

      useEffect(() => { load(date); }, []);

      const seed = async () => { const j = await post("/admin/seed"); setMsg(j.seeded || j.error); };

      const generate = async () => {
        setLoading(true);
        const j = await post("/schedule/generate", { startDate: date, weeks: Number(weeks) });
        setMsg(j.error ? "错误: "+j.error
          : `生成:${j.dialysisDays} 透析日 / ${j.drafts} 草稿 / ${j.conflicts} 冲突 / ${j.parityAssigned} 人定奇偶周`);
        await load(date); setLoading(false);
      };

      const confirmPlan = async () => {
        const j = await post("/schedule/confirm-plan", { weekStart: board.weekStart, weeks: Number(weeks) });
        setMsg(j.error ? "错误: "+j.error : `① 整盘确认:${j.confirmed} 条 → 已确认`);
        await load(date);
      };
      const confirmDay = async (level) => {
        const j = await post("/schedule/confirm-day", { date: confirmDate, level });
        setMsg(j.error ? "错误: "+j.error : `${level===2?"②次日":"③当日"}确认 ${confirmDate}:${j.confirmed} 条`);
        await load(date);
      };

      const doCancel = async () => { const j = await post(`/shifts/${menu.cell.id}/cancel`, {reason:"前端操作"}); after(j,"已取消"); };
      const doAbsent = async () => { const j = await post(`/shifts/${menu.cell.id}/absent`, {reason:"前端操作"}); after(j,"已标记缺席"); };
      const after = async (j, ok) => { setMsg(j.error ? "错误: "+j.error : ok); setMenu(null); await load(date); };
      const startMove = () => { setMoveSrc({ id: menu.cell.id, patientId: menu.cell.patientId }); setMenu(null); setMsg("移动模式:点击一个空格作为目标(再点此提示取消)"); };

      const submitTemp = async () => {
        const f = tempModal;
        const j = await post("/schedule/temporary", { patientId: Number(f.patientId), wardId: Number(f.wardId), date: f.date, mode: f.mode });
        setMsg(j.error ? "临时透析失败: "+j.error : `临时透析 #${f.patientId} 已插入`);
        setTempModal(null); await load(date);
      };
      const submitOutage = async () => {
        const f = outageModal;
        const j = await post(`/machines/${f.machine.id}/outage`, { startDate: f.startDate, endDate: f.endDate, type: Number(f.type), reason: f.reason });
        setMsg(j.error ? "停机失败: "+j.error : `${f.machine.code} 停机:受影响 ${j.affected} / 迁移 ${j.migrated} / 冲突 ${j.conflicts}`);
        setOutageModal(null); await load(date);
      };

      const submitHoliday = async () => {
        const j = await post("/schedule/holiday", { date: confirmDate, mode: 10 });
        setMsg(j.error ? "假日失败: "+j.error : `假日停诊 ${confirmDate}:取消 ${j.cancelled} / 建议 ${j.suggested} / 无位 ${j.noSlot}`);
        await load(date);
      };
      const submitPlan = async () => {
        const f = planModal;
        const j = await post(`/patients/${f.patientId}/plan-change`, { changeType: f.changeType, newValue: f.newValue, effectiveDate: f.effectiveDate });
        setMsg(j.error ? "方案变更失败: "+j.error : `方案变更 #${f.patientId}:重排 ${j.replanned} / 锁定 ${j.locked}。${j.hint||""}`);
        setPlanModal(null); await load(date);
      };

      const submitCrrt = async () => {
        const f = crrtModal;
        const j = await post("/schedule/crrt", { patientId:Number(f.patientId), wardId:Number(f.wardId), startAt:f.startAt, endAt:f.endAt });
        setMsg(j.error ? "CRRT失败: "+j.error : `CRRT #${f.patientId} 已安排`);
        setCrrtModal(null); await load(date);
      };
      const doMakeup = async (pid) => {
        const j = await post(`/patients/${pid}/makeup`, { weekStart: board.weekStart, weeks: 2 });
        setMsg(j.error ? "补排失败: "+j.error : `#${pid} 补排 ${j.placed} 次 / 冲突 ${j.conflicts}`);
        await load(date);
      };
      const onDrop = async (machineId, d, shiftId, cell) => {
        if (!dragSrc) return;
        if (cell) { setMsg("目标必须是空格"); setDragSrc(null); return; }
        const j = await post(`/shifts/${dragSrc.id}/move`, { machineId, date: d, shiftId });
        setMsg(j.error ? "移动失败: "+j.error : `${dragSrc.name||('#'+dragSrc.patientId)} 已拖动到新机位`);
        setDragSrc(null); await load(date);
      };

      const onCellClick = async (machineId, d, shiftId, cell) => {
        if (moveSrc) {
          if (cell) { setMsg("目标必须是空格"); return; }
          const j = await post(`/shifts/${moveSrc.id}/move`, { machineId, date: d, shiftId });
          setMsg(j.error ? "移动失败: "+j.error : `#${moveSrc.patientId} 已移动`);
          setMoveSrc(null); await load(date);
        } else if (cell) {
          setMenu({ cell, machineId, date: d, shiftId });
        }
      };

      const shifts = board?.shifts || [];
      const dates = board?.dates || [];
      const colCount = dates.length * shifts.length;

      return (
        <div className="max-w-full">
          <h1 className="text-xl font-bold mb-3">🩺 透析排班 · 周视图</h1>

          <div className="flex flex-wrap items-center gap-2 mb-2 text-sm">
            <label>起始周一
              <input type="date" value={date} onChange={e=>setDate(e.target.value)} className="ml-1 border rounded px-2 py-1" />
            </label>
            <select value={weeks} onChange={e=>setWeeks(e.target.value)} className="border rounded px-2 py-1">
              <option value={2}>2 周</option><option value={4}>4 周</option>
            </select>
            <button onClick={()=>load(date)} className="bg-slate-200 hover:bg-slate-300 rounded px-3 py-1">刷新</button>
            <button onClick={generate} className="bg-sky-600 hover:bg-sky-700 text-white rounded px-3 py-1">生成排班</button>
            <button onClick={seed} className="bg-slate-100 hover:bg-slate-200 border rounded px-3 py-1">写演示数据</button>
            <button onClick={()=>setTempModal({patientId:"", wardId:(board?.wards?.[0]?.id)||1, date:(dates[0]||date), mode:"HD"})}
              className="bg-rose-600 hover:bg-rose-700 text-white rounded px-3 py-1">＋临时透析</button>
            <button onClick={()=>{const cw=(board?.wards||[]).find(w=>w.zoneType==='C'); setCrrtModal({patientId:"", wardId:(cw?.id)||"", startAt:(dates[0]||date)+" 09:00", endAt:""});}}
              className="bg-fuchsia-700 hover:bg-fuchsia-800 text-white rounded px-3 py-1">＋CRRT</button>
            <span className="ml-2 text-slate-500">角色</span>
            <select value={role} onChange={e=>{ROLE=e.target.value; setRole(e.target.value);}} className="border rounded px-2 py-1" title="演示权限控制">
              <option value="">超级用户</option>
              <option value="doctor">医生</option>
              <option value="head_nurse">护士长</option>
              <option value="charge_nurse">主班护士</option>
              <option value="nurse">护士</option>
            </select>
          </div>

          <div className="flex flex-wrap items-center gap-2 mb-2 text-sm bg-white border rounded px-2 py-1.5">
            <span className="text-slate-500">确认:</span>
            <button onClick={confirmPlan} className="bg-emerald-600 hover:bg-emerald-700 text-white rounded px-2 py-1">① 整盘确认(护士长)</button>
            <select value={confirmDate} onChange={e=>setConfirmDate(e.target.value)} className="border rounded px-2 py-1">
              {dates.map((d,i)=><option key={d} value={d}>{WD[i]} {d.slice(5)}</option>)}
            </select>
            <button onClick={()=>confirmDay(2)} className="bg-amber-500 hover:bg-amber-600 text-white rounded px-2 py-1">② 次日确认</button>
            <button onClick={()=>confirmDay(3)} className="bg-orange-600 hover:bg-orange-700 text-white rounded px-2 py-1">③ 当日确认</button>
            <span className="mx-1 text-slate-300">|</span>
            <button onClick={submitHoliday} className="bg-violet-600 hover:bg-violet-700 text-white rounded px-2 py-1">设为假日(停诊)</button>
            <button onClick={()=>setPlanModal({patientId:"",changeType:"FREQ",newValue:"",effectiveDate:(dates[0]||date)})} className="bg-teal-600 hover:bg-teal-700 text-white rounded px-2 py-1">方案变更…</button>
          </div>

          <div className="flex flex-wrap gap-3 mb-2 text-xs items-center">
            <span className="px-2 py-0.5 rounded border bg-slate-100 border-slate-300">HD</span>
            <span className="px-2 py-0.5 rounded border bg-emerald-100 border-emerald-300">HDF</span>
            <span className="px-2 py-0.5 rounded border bg-rose-100 border-rose-300">CRRT</span>
            <span className="text-slate-400">✓ = 确认级别(1护士长/2次日/3当日)</span>
            {board && <span className="text-slate-500">{board.weekStart} ~ {board.weekEnd}</span>}
            <button onClick={()=>setShowConflicts(v=>!v)}
              className={"rounded px-2 py-0.5 border " + (conflicts.length ? "bg-amber-100 border-amber-400 text-amber-800" : "bg-slate-100 border-slate-300 text-slate-500")}>
              ⚠ 冲突队列 {conflicts.length}
            </button>
            <button onClick={()=>setShowDiffs(v=>!v)}
              className={"rounded px-2 py-0.5 border " + (diffs.length ? "bg-rose-100 border-rose-400 text-rose-800" : "bg-slate-100 border-slate-300 text-slate-500")}>
              📊 差异 {diffs.length}
            </button>
            {loading && <span className="text-slate-400">加载中…</span>}
            {msg && <span className="text-emerald-700 font-medium">{msg}</span>}
            {moveSrc && <button onClick={()=>{setMoveSrc(null);setMsg("已取消移动");}} className="bg-rose-100 text-rose-700 border border-rose-300 rounded px-2 py-0.5">取消移动 #{moveSrc.patientId}</button>}
          </div>

          {showConflicts && (
            <div className="mb-2 border rounded bg-amber-50/50 p-2 text-xs max-h-48 overflow-auto">
              <div className="font-semibold mb-1">⚠ 待处理冲突 / 建议({conflicts.length})</div>
              {conflicts.length===0 && <div className="text-slate-400">暂无</div>}
              {conflicts.map(c=>(
                <div key={c.id} className="flex gap-2 py-0.5 border-b border-amber-100">
                  <span className={"px-1 rounded text-white text-[10px] " + (c.severity===20?"bg-rose-600":"bg-amber-500")}>{c.severity===20?"报警":"建议"}</span>
                  <span className="font-mono text-slate-500">{c.conflictType}</span>
                  {c.patientId>0 && <span>#{c.patientId}</span>}
                  {c.scheduleDate && <span className="text-slate-400">{String(c.scheduleDate).slice(0,10)}</span>}
                  <span className="text-slate-600">{c.detail}</span>
                </div>
              ))}
            </div>
          )}

          {showDiffs && (
            <div className="mb-2 border rounded bg-rose-50/50 p-2 text-xs max-h-48 overflow-auto">
              <div className="font-semibold mb-1">📊 应排/已排差异(未来 2 周,仅列不一致者 {diffs.length})</div>
              {diffs.length===0 && <div className="text-slate-400">全部匹配,无差异</div>}
              {diffs.map(d=>(
                <div key={d.patientId} className="flex items-center gap-3 py-0.5 border-b border-rose-100">
                  <span className="font-medium">{d.patientName||('#'+d.patientId)}</span>
                  <span className="text-slate-500">应排 {d.expected} · 已排 {d.scheduled}</span>
                  <span className={d.diff>0?"text-rose-700 font-semibold":"text-sky-700"}>
                    {d.diff>0?`少排 ${d.diff} 次`:`多排 ${-d.diff} 次`}
                  </span>
                  {d.diff>0 && <button onClick={()=>doMakeup(d.patientId)} className="ml-auto bg-rose-600 hover:bg-rose-700 text-white rounded px-2 py-0.5">一键补排</button>}
                </div>
              ))}
            </div>
          )}

          {crrt.length>0 && (
            <div className="mb-2 border rounded bg-fuchsia-50/50 p-2 text-xs">
              <div className="font-semibold mb-1 text-fuchsia-800">🩸 CRRT 占用(本周交叠 {crrt.length})</div>
              {crrt.map(x=>(
                <div key={x.id} className="flex gap-3 py-0.5 border-b border-fuchsia-100">
                  <span className="font-medium">{x.patientName||('#'+x.patientId)}</span>
                  <span className="font-mono text-slate-600">{x.machineCode}</span>
                  <span className="text-slate-500">{String(x.startAt).slice(0,16).replace('T',' ')} ~ {x.endAt?String(x.endAt).slice(0,16).replace('T',' '):'进行中'}</span>
                </div>
              ))}
            </div>
          )}

          {board && (
            <div className="overflow-auto border rounded bg-white" style={{maxHeight:"72vh"}}>
              <table className="border-collapse text-xs">
                <thead className="sticky top-0 z-20 bg-slate-100">
                  <tr>
                    <th className="sticky-l bg-slate-100 border border-slate-200 px-2" rowSpan={2}>病区</th>
                    <th className="sticky-l bg-slate-100 border border-slate-200 px-2" style={{left:"56px"}} rowSpan={2}>机器</th>
                    {dates.map((d,i)=>(
                      <th key={d} className="border border-slate-200 px-1" colSpan={shifts.length}>
                        {WD[i]}<div className="font-normal text-slate-400">{d.slice(5)}</div>
                      </th>
                    ))}
                  </tr>
                  <tr>
                    {dates.map(d => shifts.map(s=>(
                      <th key={d+s.id} className="border border-slate-200 px-1 font-normal text-slate-500">{s.name.replace("班","")}</th>
                    )))}
                  </tr>
                </thead>
                <tbody>
                  {board.wards.map(w => (
                    <React.Fragment key={w.id}>
                      <tr>
                        <td colSpan={2 + colCount} className="bg-slate-50 border border-slate-200 px-2 py-1 font-semibold">
                          <span className={"text-white text-[10px] px-1.5 py-0.5 rounded mr-2 "+zoneBadge(w.zoneType)}>{w.zoneType}</span>
                          {w.name} <span className="text-slate-400 font-normal">({(w.machines||[]).length} 台)</span>
                        </td>
                      </tr>
                      {(w.machines||[]).map(m => (
                        <tr key={m.id} className="hover:bg-sky-50">
                          <td className="sticky-l bg-white border border-slate-200 px-2 text-slate-400">{w.zoneType}</td>
                          <td className="sticky-l bg-white border border-slate-200 px-2 font-medium whitespace-nowrap cursor-pointer hover:bg-rose-50"
                              title="点击登记停机"
                              onClick={()=>setOutageModal({machine:m, startDate:(dates[0]||date), endDate:(dates[0]||date), type:10, reason:""})}
                              style={{left:"56px"}}>
                            {m.code}<span className="ml-1 text-[10px] text-slate-400">{m.machineType}</span>
                          </td>
                          {dates.map(d => shifts.map(s => {
                            const cell = m.cells ? m.cells[`${d}|${s.id}`] : null;
                            const clickable = moveSrc ? !cell : !!cell;
                            const dropHL = (moveSrc||dragSrc) && !cell;
                            return (
                              <td key={d+s.id}
                                  onClick={()=> (clickable || cell) && onCellClick(m.id, d, s.id, cell)}
                                  onDragOver={e=>{ if(!cell) e.preventDefault(); }}
                                  onDrop={()=> onDrop(m.id, d, s.id, cell)}
                                  className={"border border-slate-200 p-0.5 min-w-[66px] h-10 "
                                    + (dropHL ? "cursor-pointer bg-emerald-50/40 hover:ring-2 hover:ring-emerald-400 " : "")
                                    + (cell ? "cursor-pointer " : "")}>
                                {cell && (
                                  <div draggable
                                       onDragStart={()=> setDragSrc({id:cell.id, patientId:cell.patientId, name:cell.patientName})}
                                       onDragEnd={()=> setDragSrc(null)}
                                       className={"rounded border text-[11px] leading-tight px-1 py-0.5 " + modeStyle(cell.dialysisMode)
                                       + ((moveSrc&&moveSrc.id===cell.id)||(dragSrc&&dragSrc.id===cell.id) ? " ring-2 ring-sky-500" : "")}>
                                    <div className="font-semibold flex justify-between gap-1">
                                      <span className="truncate">{cell.patientName || ('#'+cell.patientId)}</span>
                                      {cell.confirms>0 && <span className="text-emerald-600">{"✓".repeat(cell.confirms)}</span>}
                                    </div>
                                    <div className="flex justify-between">
                                      <span>{cell.dialysisMode}</span>
                                      <span className="opacity-60">{STATUS[cell.status]||cell.status}</span>
                                    </div>
                                    {cell.sourceType===20 && <div className="text-amber-600">临时</div>}
                                  </div>
                                )}
                              </td>
                            );
                          }))}
                        </tr>
                      ))}
                    </React.Fragment>
                  ))}
                </tbody>
              </table>
            </div>
          )}

          {menu && (
            <div className="fixed inset-0 bg-black/20 flex items-start justify-center pt-32 z-50" onClick={()=>setMenu(null)}>
              <div className="bg-white rounded-lg shadow-xl border w-72 p-4" onClick={e=>e.stopPropagation()}>
                <div className="font-semibold mb-1">病人 #{menu.cell.patientId}</div>
                <div className="text-xs text-slate-500 mb-3">
                  {menu.date} · {(shifts.find(s=>s.id===menu.shiftId)||{}).name} · {menu.cell.dialysisMode} · {STATUS[menu.cell.status]}
                </div>
                <div className="flex flex-col gap-2">
                  <button onClick={startMove} className="bg-sky-600 hover:bg-sky-700 text-white rounded px-3 py-1.5 text-sm">移动到空格…</button>
                  <button onClick={doCancel} className="bg-slate-100 hover:bg-slate-200 border rounded px-3 py-1.5 text-sm">取消(提前请假)</button>
                  <button onClick={doAbsent} className="bg-amber-50 hover:bg-amber-100 border border-amber-300 text-amber-800 rounded px-3 py-1.5 text-sm">标记当日缺席</button>
                  <button onClick={()=>setMenu(null)} className="text-slate-400 text-sm mt-1">关闭</button>
                </div>
              </div>
            </div>
          )}

          {tempModal && (
            <div className="fixed inset-0 bg-black/20 flex items-start justify-center pt-28 z-50" onClick={()=>setTempModal(null)}>
              <div className="bg-white rounded-lg shadow-xl border w-80 p-4" onClick={e=>e.stopPropagation()}>
                <div className="font-semibold mb-3 text-rose-700">＋ 临时透析(急诊加台)</div>
                <div className="flex flex-col gap-2 text-sm">
                  <label>病人ID <input type="number" value={tempModal.patientId} onChange={e=>setTempModal({...tempModal,patientId:e.target.value})} className="w-full border rounded px-2 py-1" placeholder="如 9001" /></label>
                  <label>病区 <select value={tempModal.wardId} onChange={e=>setTempModal({...tempModal,wardId:e.target.value})} className="w-full border rounded px-2 py-1">
                    {(board?.wards||[]).map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
                  </select></label>
                  <label>日期 <input type="date" value={tempModal.date} onChange={e=>setTempModal({...tempModal,date:e.target.value})} className="w-full border rounded px-2 py-1" /></label>
                  <label>模式 <select value={tempModal.mode} onChange={e=>setTempModal({...tempModal,mode:e.target.value})} className="w-full border rounded px-2 py-1">
                    <option>HD</option><option>HDF</option><option>CRRT</option>
                  </select></label>
                </div>
                <div className="flex gap-2 mt-3">
                  <button onClick={submitTemp} className="flex-1 bg-rose-600 hover:bg-rose-700 text-white rounded px-3 py-1.5 text-sm">插入</button>
                  <button onClick={()=>setTempModal(null)} className="flex-1 bg-slate-100 border rounded px-3 py-1.5 text-sm">取消</button>
                </div>
              </div>
            </div>
          )}

          {crrtModal && (
            <div className="fixed inset-0 bg-black/20 flex items-start justify-center pt-28 z-50" onClick={()=>setCrrtModal(null)}>
              <div className="bg-white rounded-lg shadow-xl border w-80 p-4" onClick={e=>e.stopPropagation()}>
                <div className="font-semibold mb-3 text-fuchsia-800">＋ CRRT(C 区,机器+起止时间)</div>
                <div className="flex flex-col gap-2 text-sm">
                  <label>病人ID <input type="number" value={crrtModal.patientId} onChange={e=>setCrrtModal({...crrtModal,patientId:e.target.value})} className="w-full border rounded px-2 py-1" placeholder="如 9002" /></label>
                  <label>C区 <select value={crrtModal.wardId} onChange={e=>setCrrtModal({...crrtModal,wardId:e.target.value})} className="w-full border rounded px-2 py-1">
                    {(board?.wards||[]).filter(w=>w.zoneType==='C').map(w=><option key={w.id} value={w.id}>{w.name}</option>)}
                  </select></label>
                  <label>开始 <input value={crrtModal.startAt} onChange={e=>setCrrtModal({...crrtModal,startAt:e.target.value})} className="w-full border rounded px-2 py-1" placeholder="2026-06-08 09:00" /></label>
                  <label>结束 <input value={crrtModal.endAt} onChange={e=>setCrrtModal({...crrtModal,endAt:e.target.value})} className="w-full border rounded px-2 py-1" placeholder="2026-06-09 09:00(可空=进行中)" /></label>
                </div>
                <div className="flex gap-2 mt-3">
                  <button onClick={submitCrrt} className="flex-1 bg-fuchsia-700 hover:bg-fuchsia-800 text-white rounded px-3 py-1.5 text-sm">安排</button>
                  <button onClick={()=>setCrrtModal(null)} className="flex-1 bg-slate-100 border rounded px-3 py-1.5 text-sm">取消</button>
                </div>
              </div>
            </div>
          )}

          {planModal && (
            <div className="fixed inset-0 bg-black/20 flex items-start justify-center pt-28 z-50" onClick={()=>setPlanModal(null)}>
              <div className="bg-white rounded-lg shadow-xl border w-80 p-4" onClick={e=>e.stopPropagation()}>
                <div className="font-semibold mb-3 text-teal-700">方案变更(带生效日)</div>
                <div className="flex flex-col gap-2 text-sm">
                  <label>病人ID <input type="number" value={planModal.patientId} onChange={e=>setPlanModal({...planModal,patientId:e.target.value})} className="w-full border rounded px-2 py-1" placeholder="如 1005" /></label>
                  <label>变更项 <select value={planModal.changeType} onChange={e=>setPlanModal({...planModal,changeType:e.target.value})} className="w-full border rounded px-2 py-1">
                    <option value="FREQ">频率(10一三五/20二四六/30二四/40周四)</option>
                    <option value="SHIFT">班次(班次ID)</option>
                    <option value="ZONE">分区(A/B/C)</option>
                    <option value="HDF">启用HDF(true/false)</option>
                  </select></label>
                  <label>新值 <input value={planModal.newValue} onChange={e=>setPlanModal({...planModal,newValue:e.target.value})} className="w-full border rounded px-2 py-1" placeholder="如 10 / A / true" /></label>
                  <label>生效日 <input type="date" value={planModal.effectiveDate} onChange={e=>setPlanModal({...planModal,effectiveDate:e.target.value})} className="w-full border rounded px-2 py-1" /></label>
                </div>
                <div className="flex gap-2 mt-3">
                  <button onClick={submitPlan} className="flex-1 bg-teal-600 hover:bg-teal-700 text-white rounded px-3 py-1.5 text-sm">应用</button>
                  <button onClick={()=>setPlanModal(null)} className="flex-1 bg-slate-100 border rounded px-3 py-1.5 text-sm">取消</button>
                </div>
                <div className="text-[11px] text-slate-400 mt-2">生效日后未确认的排班将取消待重排,已确认的报警人工。应用后请点「生成排班」补排。</div>
              </div>
            </div>
          )}

          {outageModal && (
            <div className="fixed inset-0 bg-black/20 flex items-start justify-center pt-28 z-50" onClick={()=>setOutageModal(null)}>
              <div className="bg-white rounded-lg shadow-xl border w-80 p-4" onClick={e=>e.stopPropagation()}>
                <div className="font-semibold mb-1">🔧 登记停机:{outageModal.machine.code}</div>
                <div className="text-xs text-slate-500 mb-3">停机时段内的排班将自动迁移(临时)或报警人工(长期)</div>
                <div className="flex flex-col gap-2 text-sm">
                  <label>起 <input type="date" value={outageModal.startDate} onChange={e=>setOutageModal({...outageModal,startDate:e.target.value})} className="w-full border rounded px-2 py-1" /></label>
                  <label>止 <input type="date" value={outageModal.endDate} onChange={e=>setOutageModal({...outageModal,endDate:e.target.value})} className="w-full border rounded px-2 py-1" /></label>
                  <label>类型 <select value={outageModal.type} onChange={e=>setOutageModal({...outageModal,type:e.target.value})} className="w-full border rounded px-2 py-1">
                    <option value={10}>临时(≤48h,自动迁移可归位)</option>
                    <option value={20}>长期/报废(报警人工迁移)</option>
                  </select></label>
                  <label>原因 <input value={outageModal.reason} onChange={e=>setOutageModal({...outageModal,reason:e.target.value})} className="w-full border rounded px-2 py-1" placeholder="如 故障维修" /></label>
                </div>
                <div className="flex gap-2 mt-3">
                  <button onClick={submitOutage} className="flex-1 bg-slate-700 hover:bg-slate-800 text-white rounded px-3 py-1.5 text-sm">登记并迁移</button>
                  <button onClick={()=>setOutageModal(null)} className="flex-1 bg-slate-100 border rounded px-3 py-1.5 text-sm">取消</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
